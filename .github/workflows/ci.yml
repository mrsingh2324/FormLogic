name: FormLogic CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend (Python/FastAPI) ──────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if python3 -c "import pymongo; pymongo.MongoClient('mongodb://localhost:27017').admin.command('ping')" 2>/dev/null; then
              echo "MongoDB is ready"
              break
            fi
            echo "Waiting for MongoDB... ($i)"
            sleep 2
          done

      - name: Run tests
        env:
          MONGODB_URI: "mongodb://localhost:27017/formlogic_test"
          JWT_SECRET: "test-secret-that-is-at-least-32-chars-long!"
          JWT_REFRESH_SECRET: "test-refresh-that-is-at-least-32-chars!"
          SMTP_USER: "test@example.com"
          SMTP_PASS: "testpass"
        run: pytest tests/ -v

  backend-build:
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t formlogic-backend:${{ github.sha }} .

  # ── Frontend (Kotlin/Android) ─────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          BASE_URL: "https://api.formlogic.ai"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: formlogic-debug-apk
          path: frontend/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
