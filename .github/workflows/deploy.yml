name: FormLogic CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: formlogic-backend
  REGION: asia-south1
  IMAGE: docker.io/${{ secrets.DOCKER_USERNAME }}/formlogic-backend

# ═══════════════════════════════════════════════════════════════════════════════
jobs:

  # ── Backend tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          MONGODB_URI: mongodb://localhost:27017/formlogic_test
          JWT_SECRET: test-secret-that-is-at-least-32-chars-long!
          JWT_REFRESH_SECRET: test-refresh-that-is-at-least-32-chars!
          SMTP_USER: test@example.com
          SMTP_PASS: testpass
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v --tb=short

  # ── Docker build & push to GCR ───────────────────────────────────────────────
  backend-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push (with layer cache)
        working-directory: backend
        run: |
          docker build \
            --tag $IMAGE:${{ github.sha }} \
            --tag $IMAGE:latest \
            --cache-from $IMAGE:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  # ── Deploy backend to Cloud Run ──────────────────────────────────────────────
  backend-deploy:
    name: Deploy Backend → Cloud Run
    runs-on: ubuntu-latest
    needs: backend-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/formlogic-backend:${{ github.sha }} \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 120 \
            --concurrency 100 \
            --port 8080 \
            --set-env-vars "NODE_ENV=production" \
            --quiet
          
          echo "URL=$(gcloud run services describe $SERVICE_NAME --platform managed --region $REGION --format 'value(status.url)')" >> $GITHUB_OUTPUT
          echo "Backend deployed at: $(gcloud run services describe $SERVICE_NAME --platform managed --region $REGION --format 'value(status.url)')"

          URL=$(gcloud run services describe $SERVICE_NAME \
            --platform managed --region $REGION \
            --format "value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          echo "Checking ${{ steps.deploy.outputs.url }}/health"
          curl --fail --retry 5 --retry-delay 5 \
            "${{ steps.deploy.outputs.url }}/health"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back"
          gcloud run services update-traffic $SERVICE_NAME \
            --platform managed --region $REGION \
            --to-revisions LATEST=0

  # ── Deploy Celery worker to Cloud Run Jobs ────────────────────────────────────
  celery-deploy:
    name: Deploy Celery Worker → Cloud Run Jobs
    runs-on: ubuntu-latest
    needs: backend-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Celery worker (Cloud Run Jobs)
        run: |
          gcloud run jobs create formlogic-celery-worker \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/formlogic-backend:${{ github.sha }} \
            --region $REGION \
            --command "celery" \
            --args "-A app.services.notification_service.celery_app worker --loglevel info --concurrency 2" \
            --set-env-vars "NODE_ENV=production" \
            --memory 256Mi \
            --cpu 1 \
            --max-retries 3 \
            --quiet \
          || gcloud run jobs update formlogic-celery-worker \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/formlogic-backend:${{ github.sha }} \
            --region $REGION \
            --quiet

  # ── Android build ─────────────────────────────────────────────────────────────
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [backend-test, backend-deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get backend URL
        id: backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe $SERVICE_NAME --platform managed --region $REGION --format 'value(status.url)')
          echo "Backend URL: $BACKEND_URL"
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Create local.properties
        run: |
          echo "BASE_URL=${{ steps.backend-url.outputs.backend_url }}" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_FILE:     ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign APK
        if: env.KEYSTORE_FILE != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > formlogic.jks
          ${ANDROID_HOME}/build-tools/35.0.0/apksigner sign \
            --ks formlogic.jks \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FormLogic-Release-${{ github.sha }}
          path: frontend/app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ── PR preview comment ────────────────────────────────────────────────────────
  pr-comment:
    name: PR Status Comment
    runs-on: ubuntu-latest
    needs: [backend-test, android-build]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ FormLogic CI Passed\n\n| Check | Status |\n|---|---|\n| Python Tests | ✅ Passed |\n| Android Build | ✅ Passed |\n\nReady to merge.`
            })
