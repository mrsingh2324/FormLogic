version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: ./backend/.env
    environment:
      PORT: "8080"
      MONGODB_URI: "mongodb://mongo:27017/formlogic"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery_worker:
    build: ./backend
    command: >
      celery -A app.worker worker --loglevel=info --concurrency=4
    env_file: ./backend/.env
    environment:
      MONGODB_URI: "mongodb://mongo:27017/formlogic"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  celery_beat:
    build: ./backend
    command: >
      celery -A app.worker beat --loglevel=info 
    env_file: ./backend/.env
    environment:
      MONGODB_URI: "mongodb://mongo:27017/formlogic"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD","mongosh","--quiet","--eval","db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongo_express:
    image: mongo-express:1.0
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://mongo:27017/"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: formlogic_dev
    depends_on:
      - mongo
    profiles:
      - dev

volumes:
  mongo_data:
  redis_data:
  backend_logs:
